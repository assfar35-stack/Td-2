<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/main.css" />
    <title>Td-2</title>
  </head>
  <body>
    <h1>DOM Manipulation</h1>

    <div class="exercise-container">
      <h2>Exercice 1 : Changement de thème (Dark / Light Mode)</h2>
      <button id="btn" onclick="toggle()">☀️ Mode clair</button>
    </div>

    <div class="exercise-container">
      <h2>Exercice 2 : Barre de progression</h2>
    </div>

    <div class="exercise-container">
      <h2>Exercice 3 : Filtrage de liste en temps réel</h2>
    </div>

    <div class="exercise-container">
      <h2>Exercice 4 :Délégation d'événements</h2>
    </div>

    <script>
      /* exercise 1 */

      document.body.classList.toggle("dark", localStorage.theme === "dark");
      function toggle() {
        document.body.classList.toggle("dark");
        localStorage.theme = document.body.classList.contains("dark")
          ? "dark"
          : "light";
      }

      
    </script>
  </body>
</html>
