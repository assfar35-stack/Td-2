<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/main.css" />
    <title>Td-2</title>
  </head>
  <body>
    <h1>DOM Manipulation</h1>

    <div class="exercise-container">
      <h2>Exercice 1 : Changement de thème (Dark / Light Mode)</h2>
      <button onclick="Mode()" id="btn">Make it dark</button>
    </div>

    <div class="exercise-container">
      <h2>Exercice 2 : Barre de progression</h2>
      <div id="bar-container">
        <div id="bar">0%</div>
      </div>
      <button onclick="increment()" id="btn-plus">+10%</button>
      <button onclick="reset()" id="btn-reset">Réinitialiser</button>
    </div>

    <div class="exercise-container">
      <h2>Exercice 3 : Filtrage de liste en temps réel</h2>
    </div>

    <div class="exercise-container">
      <h2>Exercice 4 :Délégation d'événements</h2>
    </div>

    <script>
      /* exercise 1 */
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "dark") {
        document.body.classList.add("dark-mode");
      }

      function Mode() {
        const element = document.body;
        element.classList.toggle("dark-mode");

        if (element.classList.contains("dark-mode")) {
          localStorage.setItem("theme", "dark");
        } else {
          localStorage.setItem("theme", "light");
        }
      }

      /* exercise 2 */
      let progress = 0;

        function increment() {
            if (progress < 100) {
            progress += 10;
            document.getElementById("bar").style.width = progress + "%";
            document.getElementById("bar").textContent = progress + "%";
            }
        }

        function reset() {
            progress = 0;
            document.getElementById("bar").style.width = "0%";
            document.getElementById("bar").textContent = "0%";
        }

        
    </script>
  </body>
</html>
